- name: Stop vault
  command:
    argv:
      - "/usr/bin/docker"
      - "compose"
      - "down"
    chdir: "{{ vault_deploy_dir }}"
  become: true
  ignore_errors: true

- name: Start vault
  command:
    argv:
      - "/usr/bin/docker"
      - "compose"
      - "up"
      - "-d"
      - "--force-recreate"
    chdir: "{{ vault_deploy_dir }}"
  become: true
